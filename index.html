<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Login UI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-box">

    <h2>Welcome Back</h2>

    <input 
      type="email" 
      id="email" 
      placeholder="Email Address"
    >

    <input 
      type="password" 
      id="password" 
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <a href="#" class="forgot">
      Forgot Password?
    </a>

    <p id="message"></p>

  </div>

  <div id="popup" class="popup">
    Login Successful!
  </div>

  <script>

    function login(){

      let email =
      document.getElementById("email").value;

      let password =
      document.getElementById("password").value;

      let message =
      document.getElementById("message");

      if(email === "" || password === ""){

        message.innerHTML =
        "Please fill all fields";

      }

      else{

        message.innerHTML = "";

        document.getElementById("popup")
        .style.display = "block";

        setTimeout(()=>{

          document.getElementById("popup")
          .style.display = "none";

        },2000);

      }

    }

  </script>

</body>
</html>
